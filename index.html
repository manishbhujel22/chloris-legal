<!DOCTYPE html>
<!-- Legal copy should be reviewed before final App Store submission. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="all" />
  <title>Chloris — Legal</title>
  <style>
    :root {
      --bg: #fbfbf9;
      --card: #ffffff;
      --ink: #1b2620;
      --ink2: #4a564e;
      --ink3: #8a948c;
      --accent: #2f7a4f;
      --hair: #e7e9e5;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 32px 20px 64px;
    }
    main { max-width: 720px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 28px; }
    .logo {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 16px;
      background: #eaf3ec; color: var(--accent); font-size: 30px; margin-bottom: 12px;
    }
    h1 { font-size: 26px; margin: 4px 0 2px; }
    .sub { color: var(--ink3); font-size: 14px; }
    .links { display: grid; gap: 12px; margin-top: 8px; }
    a.card {
      display: flex; align-items: center; justify-content: space-between;
      text-decoration: none; color: var(--ink);
      background: var(--card); border: 1px solid var(--hair);
      border-radius: 14px; padding: 16px 18px; font-weight: 600;
    }
    a.card:hover { border-color: var(--accent); }
    a.card .chev { color: var(--ink3); }
    footer { text-align: center; color: var(--ink3); font-size: 12.5px; margin-top: 40px; }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="logo">🌿</div>
      <h1>Chloris</h1>
      <div class="sub">Legal &amp; privacy</div>
    </header>

    <nav class="links">
      <a class="card" href="privacy.html">Privacy Policy <span class="chev">›</span></a>
      <a class="card" href="terms.html">Terms of Use <span class="chev">›</span></a>
    </nav>

    <footer>
      Questions? <a href="mailto:support@chloris.app">support@chloris.app</a>
    </footer>
  </main>
</body>
</html>
